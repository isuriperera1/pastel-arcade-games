<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memory Match · Arcade Games</title>
    <link rel="stylesheet" href="../../styles/theme.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div id="site-nav" data-base="../.."></div>

      <main class="page-main page-main--game">
        <header class="game-header">
          <h1>Memory Match</h1>
          <p class="lede">Flip two cards. Find every pair.</p>
        </header>

        <div class="game-shell">
          <div class="hud">
            <div class="stat-row">
              <div class="stat">
                <span class="stat__label">Moves</span>
                <span class="stat__value" id="moves">0</span>
              </div>
              <div class="stat">
                <span class="stat__label">Time</span>
                <span class="stat__value" id="timer">0:00</span>
              </div>
            </div>
            <button type="button" class="btn btn--primary" id="restart">
              New Game
            </button>
          </div>

          <div class="text-center">
            <div class="seg" role="group" aria-label="Difficulty">
              <button type="button" class="seg__btn is-active" data-size="4" aria-pressed="true">
                4×4
              </button>
              <button type="button" class="seg__btn" data-size="6" aria-pressed="false">
                6×6
              </button>
            </div>
          </div>

          <div class="board-wrap" id="board-wrap">
            <div class="memory-grid" id="board" role="grid" aria-label="Memory board"></div>

            <div class="modal-backdrop" id="overlay" aria-hidden="true">
              <div class="modal-card" role="dialog" aria-labelledby="win-title">
                <h2 id="win-title">All matched!</h2>
                <p id="win-msg">Great memory.</p>
                <button type="button" class="btn btn--primary" id="play-again">
                  Play Again
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../../js/shell.js"></script>
    <script src="script.js"></script>
  </body>
</html>
